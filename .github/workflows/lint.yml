name: lint

on:
  push:
    branches: [dev]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Test lint rules
        run: bun lint:test

      - name: Run lint
        run: bun lint --quiet
